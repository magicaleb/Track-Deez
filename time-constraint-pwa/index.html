<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7c2d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeLens" />
  <title>TimeLens • Do Now</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="focus">
  <div class="app-shell focus-shell">
    <header class="focus-topbar">
      <h1>TimeLens</h1>
      <a class="cog-link" href="./setup.html" aria-label="Open setup">⚙</a>
    </header>

    <main class="focus-main">
      <section class="focus-controls panel glass-warm">
        <label for="available-minutes" class="focus-label">How many minutes do you have?</label>
        <input id="available-minutes" class="focus-minutes-input" type="number" min="1" max="1440" inputmode="numeric" placeholder="30" />
        <div class="focus-button-row" id="primary-controls">
          <button id="go-button" class="button jumbo" type="button">Go</button>
        </div>
        <div class="focus-button-row" id="result-controls" hidden>
          <button id="choose-button" class="button ghost jumbo" type="button">Choose task</button>
        </div>
        <p id="filter-status" class="muted" aria-live="polite"></p>
      </section>

      <section id="task-display" class="task-hero panel" hidden>
        <div>
          <p class="task-hero-label">Your task</p>
          <h2 id="hero-task-name" class="task-hero-name"></h2>
          <p id="hero-task-meta" class="task-hero-meta"></p>
        </div>
        <div class="task-hero-actions">
          <button id="done-button" class="button success jumbo" type="button">Done</button>
          <button id="progress-button" class="button ghost jumbo" type="button">Progress made</button>
        </div>
      </section>

      <section id="choose-panel" class="panel" hidden>
        <div class="panel-head">
          <h2>Pick a task</h2>
          <button id="close-choose" class="button ghost" type="button">Close</button>
        </div>
        <ul id="choose-list" class="task-list"></ul>
      </section>
    </main>
  </div>

  <!-- iOS haptic feedback: WebKit fires haptics when a switch-type checkbox is toggled -->
  <input type="checkbox" switch id="haptic-trigger" class="haptic-trigger" aria-hidden="true" tabindex="-1">
  <label for="haptic-trigger" id="haptic-label" class="haptic-trigger" aria-hidden="true"></label>

  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <template id="choose-item-template">
    <li class="task-card compact">
      <div>
        <h3 class="task-name"></h3>
        <p class="task-meta"></p>
      </div>
      <button data-action="select" class="button">Use task</button>
    </li>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
